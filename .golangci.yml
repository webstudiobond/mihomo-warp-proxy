version: 2

run:
  timeout: 5m
  tests: true

linters:
  # В v2 'disable-all: true' заменено на 'default: none'
  default: none
  enable:
    - errcheck
    - staticcheck # Включает в себя gosimple и stylecheck
    - ineffassign
    - gosec
    - bodyclose
    - noctx
    - gocyclo
    - prealloc
    - unconvert
    - gocritic
    - goconst
    - revive
    - misspell
    - nakedret
    - unparam
    - whitespace
    - errname
    - copyloopvar

  # Настройки линтеров теперь внутри linters.settings
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - performance
        - style

# Форматировщики вынесены в отдельную секцию
formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
