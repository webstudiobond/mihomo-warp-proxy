version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - ineffassign
    - govet
    - nilerr
    - nilnil
    - nilnesserr
    - errorlint
    - durationcheck
    - makezero
    - recvcheck
    - reassign

    - gosec

    - bodyclose
    - noctx

    - staticcheck
    - wrapcheck
    - contextcheck
    - nosprintfhostport
    - forcetypeassert
    - nolintlint

    - sqlclosecheck
    - rowserrcheck

    - prealloc
    - perfsprint
    - fatcontext
    - mirror

    - gocyclo
    - unconvert
    - gocritic
    - goconst
    - unused
    - wastedassign
    - nestif
    - predeclared
    - intrange
    - modernize
    - exptostd

    - revive
    - errname
    - nakedret
    - unparam
    - whitespace
    - misspell
    - godoclint
    - copyloopvar

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    gocyclo:
      min-complexity: 15

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - performance
        - style

    govet:
      enable-all: true

    nestif:
      min-complexity: 5

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    wrapcheck:
      ignore-package-globs:
        - encoding/*
        - github.com/pkg/errors

  exclusions:
    presets: []
    rules:
      - path: _test\.go
        linters:
          - wrapcheck
          - contextcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
