version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - ineffassign
    - gosec
    - bodyclose
    - noctx
    - gocyclo
    - prealloc
    - unconvert
    - gocritic
    - goconst
    - revive
    - misspell
    - nakedret
    - unparam
    - whitespace
    - errname
    - copyloopvar

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - performance
        - style

  exclusions:
    presets: []

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
