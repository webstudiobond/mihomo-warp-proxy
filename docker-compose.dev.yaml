name: mihomo-warp-proxy-dev

# Local development compose file — builds the image from the cloned repository
# source instead of pulling from the registry.
# Security considerations for local builds: https://github.com/underhax/mihomo-warp-proxy?tab=readme-ov-file#security-considerations-for-local-builds
#
# Usage:
#   docker compose -f docker-compose.dev.yaml up --build
# or:
#   docker compose -f docker-compose.dev.yaml build --no-cache && docker compose -f docker-compose.dev.yaml up

services:
  mihomo-proxy:
    build:
      context: .
      args:
        # v1 = baseline x86-64, v2 = SSE4.2, v3 = AVX2.
        # To detect your level:
        #   grep -q avx2 /proc/cpuinfo && echo v3 || { grep -q sse4_2 /proc/cpuinfo && echo v2 || echo v1; }
        MIHOMO_CPU_VARIANT: ${MIHOMO_CPU_VARIANT:-v1}
    image: mihomo-warp-proxy-dev:local
    pull_policy: never
    container_name: mihomo-warp-proxy-dev
    hostname: mihomo-warp-proxy-dev
    restart: on-failure:3
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          curl -sf --socks5-hostname localhost:${PROXY_PORT:-7890}
          --proxy-user "${PROXY_USER}:${PROXY_PASS}"
          https://cp.cloudflare.com/generate_204 || exit 1
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    env_file:
    # https://raw.githubusercontent.com/underhax/mihomo-warp-proxy/main/env-example
      - path: .env
        required: false
    # Full description of all variables:
    # https://github.com/underhax/mihomo-warp-proxy#configuration
    environment:
      MIHOMO_CPU_VARIANT: ${MIHOMO_CPU_VARIANT:-v1}
      TZ: ${TZ:-UTC}
      SCRIPT_LOG_LEVEL: ${SCRIPT_LOG_LEVEL:-ERROR}
      PROXY_LOG_LEVEL: ${PROXY_LOG_LEVEL:-error}
      PROXY_UID: ${PROXY_UID:-911}
      PROXY_GID: ${PROXY_GID:-911}
      PROXY_PORT: ${PROXY_PORT:-7890}
      PROXY_USER: ${PROXY_USER:-}
      PROXY_PASS: ${PROXY_PASS:-}
      USE_IP6: ${USE_IP6:-true}
      GEO: ${GEO:-false}
      GEO_REDOWNLOAD: ${GEO_REDOWNLOAD:-false}
      GEO_URL_GEOIP: ${GEO_URL_GEOIP:-}
      GEO_URL_GEOSITE: ${GEO_URL_GEOSITE:-}
      GEO_URL_MMDB: ${GEO_URL_MMDB:-}
      GEO_URL_ASN: ${GEO_URL_ASN:-}
      GEO_AUTH_USER: ${GEO_AUTH_USER:-}
      GEO_AUTH_PASS: ${GEO_AUTH_PASS:-}
      USE_WARP_CONFIG: ${USE_WARP_CONFIG:-true}
      WARP_REGENERATE: ${WARP_REGENERATE:-false}
      WARP_PLUS_KEY: ${WARP_PLUS_KEY:-}
      WARP_ENDPOINT: ${WARP_ENDPOINT:-engage.cloudflareclient.com:500}
      WARP_DNS: ${WARP_DNS:-1.1.1.1,1.0.0.1,2606:4700:4700::1111,2606:4700:4700::1001}
      WARP_AMNEZIA: ${WARP_AMNEZIA:-false}
      WARP_AMNEZIA_JC: ${WARP_AMNEZIA_JC:-}
      WARP_AMNEZIA_JMIN: ${WARP_AMNEZIA_JMIN:-}
      WARP_AMNEZIA_JMAX: ${WARP_AMNEZIA_JMAX:-}
      WARP_AMNEZIA_I1: ${WARP_AMNEZIA_I1:-}
      WARP_AMNEZIA_I2: ${WARP_AMNEZIA_I2:-}
      WARP_AMNEZIA_I3: ${WARP_AMNEZIA_I3:-}
      WARP_AMNEZIA_I4: ${WARP_AMNEZIA_I4:-}
      WARP_AMNEZIA_I5: ${WARP_AMNEZIA_I5:-}
    volumes:
      - ./mihomo-data:/app/mihomo:rw
      - ./wgcf-data:/app/wgcf:rw
    ports:
      - "127.0.0.1:${PROXY_PORT:-7890}:${PROXY_PORT:-7890}"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
      # Uncomment NET_BIND_SERVICE if you need to bind ports below 1024 — for example, when adding a custom VLESS or HTTPS listener on port 443 in config.yaml.
      # - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 512
        hard: 512
      memlock:
        soft: 65536
        hard: 65536
    logging:
      options:
        max-size: "10M"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

networks:
  proxy:
